glob_matcher: doublestar

commit-msg:
  commands:
    dco-signoff:
      run: ./scripts/check_dco_signoff.sh --commit-msg-file {1}

pre-commit:
  commands:
    license-headers:
      run: cargo run --quiet --locked --manifest-path tools/license-headers/Cargo.toml -- --check {staged_files}

    cargo-sort:
      glob:
        - Cargo.toml
        - tools/license-headers/Cargo.toml
        - xtask/Cargo.toml
      run: ./scripts/cargo_sort_manifests.sh {staged_files}
      stage_fixed: true

    rustfmt:
      glob:
        - "src/**/*.rs"
        - "tests/**/*.rs"
        - "tools/license-headers/**/*.rs"
        - "xtask/**/*.rs"
      run: rustfmt --edition 2024 {staged_files}
      stage_fixed: true

    clippy:
      glob:
        - "src/**/*.rs"
        - "tests/**/*.rs"
      run: cargo clippy --all-targets --all-features -- -D warnings

    xtask-clippy:
      glob:
        - "xtask/**/*.rs"
      run: cargo clippy --manifest-path xtask/Cargo.toml --all-targets -- -D warnings

    license-headers-clippy:
      glob:
        - "tools/license-headers/**/*.rs"
      run: cargo clippy --manifest-path tools/license-headers/Cargo.toml --all-targets -- -D warnings

    check-release-version-sync:
      glob:
        - Cargo.toml
        - CITATION.cff
        - xtask/Cargo.toml
        - release.sh
      run: ./scripts/check_release_version_sync.sh

    dependency-policy:
      glob:
        - Cargo.toml
        - Cargo.lock
        - deny.toml
        - tools/license-headers/Cargo.toml
      run: ./scripts/check_dependency_policy.sh

    generate-supported-formats:
      glob: src/parsers/*.rs
      exclude:
        - src/parsers/*_test.rs
        - src/parsers/*_golden_test.rs
      run: cargo run --quiet --locked --manifest-path xtask/Cargo.toml --bin generate-supported-formats && git add docs/SUPPORTED_FORMATS.md

    markdown-lint:
      glob: "**/*.md"
      run: npm exec -- markdownlint-cli2 --fix --no-globs {staged_files}
      stage_fixed: true

    prettier:
      glob:
        - "**/*.yml"
        - "**/*.yaml"
        - "**/*.json"
        - "**/*.md"
      run: npm exec -- prettier --write {staged_files}
      stage_fixed: true
