name: Quality Checks

on:
  push:
    branches:
      - main
      - "renovate/*"
  pull_request:
    types: [opened, reopened, synchronize]

env:
  CARGO_TERM_COLOR: always

jobs:
  license-index:
    name: Verify Embedded License Index
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: recursive
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: embedded-license-index

      - name: Verify embedded license index
        uses: ./.github/actions/verify-embedded-license-index

      - name: Verify ScanCode output format version sync
        uses: ./.github/actions/verify-scancode-output-format-version

  rust-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""
          components: rustfmt, clippy

      - name: Read Rust toolchain version
        id: rust-toolchain-version
        shell: bash
        run: |
          version="$(python3 - <<'PY'
          import tomllib

          with open('rust-toolchain.toml', 'rb') as fh:
              print(tomllib.load(fh)['toolchain']['channel'])
          PY
          )"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check release version sync
        run: ./scripts/check_release_version_sync.sh

      - name: Check xtask lockfile sync and supported formats
        run: cargo run --quiet --locked --manifest-path xtask/Cargo.toml --bin generate-supported-formats -- --check

      - name: Check packaged crate size
        run: ./scripts/check_crate_size.sh

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install cargo-sort
        run: cargo install --locked cargo-sort

      - name: Check Cargo.toml sorting
        run: ./scripts/cargo_sort_manifests.sh --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check compilation
        run: cargo check --all --verbose

      - name: Run doctests
        run: cargo test --doc --release --verbose

      - name: Check dependency policy
        uses: EmbarkStudios/cargo-deny-action@44db170f6a7d12a6e90340e9e0fca1f650d34b14
        with:
          rust-version: ${{ steps.rust-toolchain-version.outputs.version }}
          manifest-path: ./Cargo.toml
          arguments: ""
          command: check advisories bans licenses sources

      - name: Install cargo-machete
        run: cargo install --locked cargo-machete

      - name: Check for unused dependencies
        run: ./scripts/check_unused_deps.sh

  rust-library-tests:
    name: Rust Library Tests
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-library-tests-release

      - name: Run library tests except scanner/assembly contract layer
        run: "cargo test --lib --release --verbose -- --skip _scan_test::"

  windows-build-smoke:
    name: Windows Build Smoke Test
    runs-on: windows-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build-smoke

      - name: Build and run Windows CLI smoke check
        run: cargo run --quiet --locked --bin provenant -- --show-attribution | Out-Null

  intel-macos-build-smoke:
    name: Intel macOS Build Smoke Test
    runs-on: macos-15-intel
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: intel-macos-build-smoke

      - name: Build and run Intel macOS CLI smoke check
        run: cargo run --quiet --locked --bin provenant -- --show-attribution > /dev/null

  rust-scan-integration-tests:
    name: Scan and Integration Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: parser-scan-contracts
            shared_key: rust-scan-integration-tests-release-parser-scan-contracts
          - shard: integration-suites
            shared_key: rust-scan-integration-tests-release-integration-suites
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.shared_key }}

      - name: Run parser-local scanner/assembly contract tests
        if: matrix.shard == 'parser-scan-contracts'
        run: "cargo test --lib --release --verbose _scan_test::"

      - name: Run scanner integration suite
        if: matrix.shard == 'integration-suites'
        run: cargo test --test scanner_integration --release --verbose

      - name: Run scanner copyright/credits integration suite
        if: matrix.shard == 'integration-suites'
        run: cargo test --test scanner_copyright_credits --release --verbose

      - name: Run progress CLI integration suite
        if: matrix.shard == 'integration-suites'
        run: cargo test --test progress_cli_integration --release --verbose

      - name: Run output contract fixture suite
        if: matrix.shard == 'integration-suites'
        run: cargo test --test output_format_golden --release --verbose

  golden-tests:
    name: Golden Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: copyright
            filter: "copyright::golden_test::tests::"
            profile: release
            test-target: lib
          - shard: assembly
            filter: "assembly::assembly_golden_test::"
            profile: debug
            test-target: lib
          - shard: finder
            filter: "finder::golden_test::tests::"
            profile: debug
            test-target: lib
          - shard: license-detection
            filter: "license_detection::golden_test::golden_tests::"
            profile: release
            test-target: lib
          - shard: post-processing
            filter: "post_processing::golden_test::tests::"
            profile: release
            test-target: bin
          - shard: parsers
            filter: "parsers::golden_test::"
            profile: debug
            test-target: lib
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: false
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: golden-tests-${{ matrix.profile }}

      - name: Run golden test shard
        shell: bash
        run: |
          set -euo pipefail
          cargo_args=(test --lib --verbose --features golden-tests "${{ matrix.filter }}")
          if [[ "${{ matrix.test-target }}" == "bin" ]]; then
            cargo_args=(test --bin provenant --verbose --features golden-tests "${{ matrix.filter }}")
          fi
          if [[ "${{ matrix.profile }}" == "release" ]]; then
            cargo_args=(test --lib --release --verbose --features golden-tests "${{ matrix.filter }}")
            if [[ "${{ matrix.test-target }}" == "bin" ]]; then
              cargo_args=(test --bin provenant --release --verbose --features golden-tests "${{ matrix.filter }}")
            fi
          fi

          echo "Running golden filter: ${{ matrix.filter }} (${{ matrix.profile }}, ${{ matrix.test-target }})"
          cargo "${cargo_args[@]}"

  docs-quality:
    name: Documentation Quality
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Validate URLs
        run: npm run validate:urls
        continue-on-error: true

      - name: Lint Markdown
        run: npm run lint:md
