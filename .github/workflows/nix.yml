name: Nix Flake

on:
  push:
    branches:
      - main
      - "renovate/*"
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  nix-build-smoke:
    name: Nix Build Smoke Test
    runs-on: ubuntu-latest
    if: |
      !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/'))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
          lfs: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Check flake evaluation
        run: nix flake check --no-build

      - name: Build provenant
        run: nix build '.#'

      - name: Smoke test CLI
        run: |
          ./result/bin/provenant --version
          ./result/bin/provenant --show-attribution > /dev/null

      - name: Smoke test dev shell
        run: nix develop --command cargo --version
