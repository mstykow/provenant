# Rules and licenses Provenant intentionally excludes when building the license index.
#
# Rule identifiers must match LoadedRule.identifier values (typically full filenames).
# License entries must match LoadedLicense.key values.
#
# This manifest keeps the small, reviewable curation decisions:
# - `ignored_rules` / `ignored_licenses` remove upstream entries.
# - file-based add/replace overlays live under `resources/license_detection/overlay/`
#   using the exact upstream `.RULE` / `.LICENSE` syntax.
# - overlay semantics are collision-based: matching identifiers/keys replace
#   upstream entries, new identifiers/keys are added.
#
# The active curation fingerprint and applied changes are embedded into the
# generated license artifact and surfaced in scan output headers.

ignored_rules = [
  # Android-generated header boilerplate says this text contains no copyrightable information; see ScanCode PR #4683.
  "gpl-2.0_and-unknown-license-reference_1.RULE",
  # Bare freertos.org URL references such as a00127.html false-positive as GPL-2.0+ WITH FreeRTOS exception; see ScanCode issues #4147 and #4441.
  "gpl-2.0-plus_with_freertos-exception-2.0_1.RULE",
  # Bare CAL-1.0 tokenization false-positives on calibration macros; see ScanCode issue #4740 and PR #4759.
  "cal-1.0_10.RULE",
]

ignored_licenses = []
